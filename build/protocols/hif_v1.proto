syntax = "proto3";

package hif.v1;

// Service for repository-level versioning primitives.
service VersioningService {
  rpc GetRepositoryHead(GetRepositoryHeadRequest) returns (RepositoryHeadResponse);
  rpc GetHeadAt(GetHeadAtRequest) returns (RepositoryHeadResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc OpenSession(SessionOpenRequest) returns (SessionInfo);
  rpc AppendSessionConversation(SessionEventAppendRequest) returns (SessionInfo);
  rpc AppendSessionChange(SessionChangeAppendRequest) returns (SessionInfo);
  rpc ReplaceSessionChanges(SessionChangesReplaceRequest) returns (SessionInfo);
  rpc LandSession(LandSessionRequest) returns (SessionInfo);
  rpc AbandonSession(AbandonSessionRequest) returns (SessionInfo);
  rpc GetSession(SessionRequest) returns (SessionInfo);
}

// Service for content reads and path operations.
service ContentService {
  rpc GetTree(GetTreeRequest) returns (TreeResponse);
  rpc GetPath(GetPathRequest) returns (PathResponse);
  rpc GetBlob(GetBlobRequest) returns (BlobResponse);
  rpc Diff(DiffRequest) returns (DiffResponse);
  rpc Blame(BlameRequest) returns (BlameResponse);
}

// Service for remote grep/search at scale.
service SearchService {
  rpc QueryText(TextQueryRequest) returns (TextQueryResponse);
}

message RepositoryRef {
  string account_handle = 1; // REQUIRED
  string repository_handle = 2;  // REQUIRED
}

message Position {
  bytes hash = 1;     // REQUIRED
  string at = 2;
}

message RepositoryHeadResponse {
  RepositoryRef repository = 1;   // REQUIRED
  Position head = 2;              // REQUIRED
  string head_etag = 3;           // REQUIRED
}

message GetRepositoryHeadRequest {
  RepositoryRef repository = 1; // REQUIRED
}

message GetHeadAtRequest {
  RepositoryRef repository = 1; // REQUIRED
  bytes revision_hash = 2; // REQUIRED
}

message IdentityRef {
  string id = 1;       // REQUIRED canonical identity id (URI or URN)
  string acct = 2;     // OPTIONAL fediverse-style account (user@instance)
  string handle = 3;   // OPTIONAL display handle
  string instance = 4; // OPTIONAL identity host/instance
  string kind = 5;     // REQUIRED user|agent|system
}

message Attribution {
  IdentityRef attributed_to = 1; // REQUIRED work ownership/credit
  IdentityRef performed_by = 2;  // REQUIRED executor identity
}

message SessionEvent {
  string role = 1;     // REQUIRED. human|agent
  string kind = 2;     // REQUIRED. note|decision|command|output
  string text = 3;     // REQUIRED
  bytes metadata = 4;  // OPTIONAL
  uint64 at_ms = 5;    // REQUIRED
}

message FileOperation {
  enum Action {
    ACTION_UNSPECIFIED = 0;
    ACTION_CREATE = 1;
    ACTION_UPDATE = 2;
    ACTION_DELETE = 3;
    ACTION_RENAME = 4;
  }
  Action action = 1;      // REQUIRED
  string path = 2;        // REQUIRED
  bytes content = 3;      // OPTIONAL (required for create/update)
  string old_path = 4;    // REQUIRED for rename
  string content_hash = 5; // REQUIRED for rename/update/delete verification
}

message SessionOpen {
  string session_id = 1;        // REQUIRED
  string goal = 2;              // REQUIRED
  Position base_position = 3;    // REQUIRED
  string requested_workspace = 4; // OPTIONAL
}

message SessionInfo {
  string session_id = 1;        // REQUIRED
  RepositoryRef repository = 2; // REQUIRED
  string goal = 3;             // REQUIRED
  string status = 4; // REQUIRED: draft|active|landed|conflict|abandoned
  Position base_position = 5;   // REQUIRED
  Position current_position = 6; // REQUIRED
  repeated SessionEvent conversation = 7; // OPTIONAL
  repeated SessionEvent decisions = 8; // OPTIONAL
  repeated FileOperation changes = 9; // OPTIONAL
  Attribution attribution = 10; // OPTIONAL
  uint64 created_at_ms = 11; // REQUIRED
  uint64 updated_at_ms = 12; // REQUIRED
  SessionConflict conflict = 13; // OPTIONAL: present when status=conflict
}

message SessionConflict {
  bytes revision_hash = 1; // REQUIRED
  string session_id = 2; // REQUIRED
  string reason = 3;     // REQUIRED summary
  repeated string paths = 4; // OPTIONAL
}

message SessionOpenRequest {
  RepositoryRef repository = 1; // REQUIRED
  SessionOpen open = 2;    // REQUIRED
}

message SessionRequest {
  string session_id = 1; // REQUIRED
}

message SessionSummary {
  string id = 1;       // REQUIRED
  string goal = 2;     // REQUIRED
  IdentityRef attributed_to = 3; // REQUIRED
  bytes revision_hash = 4; // REQUIRED
}

message ListSessionsRequest {
  RepositoryRef repository = 1; // REQUIRED
  string path = 2;          // OPTIONAL
  uint32 limit = 3;         // OPTIONAL
}

message ListSessionsResponse {
  repeated SessionSummary sessions = 1; // OPTIONAL
}

message SessionEventAppendRequest {
  string session_id = 1;  // REQUIRED
  SessionEvent event = 2; // REQUIRED
}

message SessionChangeAppendRequest {
  string session_id = 1;     // REQUIRED
  FileOperation operation = 2; // REQUIRED
}

message SessionChangesReplaceRequest {
  string session_id = 1;           // REQUIRED
  repeated FileOperation operations = 2; // OPTIONAL full draft snapshot, may be empty
  uint32 epoch = 3;                // OPTIONAL
}

message LandSessionRequest {
  string session_id = 1;    // REQUIRED
  repeated SessionEvent decision = 2; // OPTIONAL
  bool finalize = 3;        // REQUIRED
  uint32 epoch = 4;         // OPTIONAL
  bool force = 5;           // OPTIONAL
}

message AbandonSessionRequest {
  string session_id = 1; // REQUIRED
}

message TreeEntry {
  string path = 1;
  string hash = 2;
}

message TreeRequest {
  RepositoryRef repository = 1;
  bytes tree_hash = 2;
  string prefix = 3;
}

message TreeResponse {
  RepositoryRef repository = 1;
  bytes tree_hash = 2;
  repeated TreeEntry entries = 3;
}

message GetTreeRequest {
  RepositoryRef repository = 1; // REQUIRED
  bytes revision_hash = 2; // OPTIONAL (defaults to HEAD)
}

message GetPathRequest {
  RepositoryRef repository = 1; // REQUIRED
  bytes revision_hash = 2; // OPTIONAL (defaults to HEAD)
  string path = 3;         // REQUIRED
}

message PathResponse {
  bytes content = 1;       // REQUIRED
  bytes content_hash = 2;  // REQUIRED
  uint32 mode = 3;         // REQUIRED
  uint64 size = 4;         // REQUIRED
}

message GetBlobRequest {
  bytes content_hash = 1;  // REQUIRED
}

message BlobResponse {
  bytes content = 1; // REQUIRED
}

message DiffRequest {
  RepositoryRef repository = 1; // REQUIRED
  bytes from_revision_hash = 2; // REQUIRED
  bytes to_revision_hash = 3;   // OPTIONAL (defaults to HEAD)
  string path_prefix = 4;   // OPTIONAL
}

message DiffHunk {
  string path = 1;
  uint32 line = 2;
  string old_line = 3;
  string new_line = 4;
}

message DiffResponse {
  repeated DiffHunk hunks = 1; // OPTIONAL
}

message BlameLine {
  string path = 1;
  uint32 line = 2;
  string text = 3;
  string session_id = 4;
  IdentityRef attributed_to = 5;
  bytes revision_hash = 6;
  uint64 landed_at = 7;
}

message BlameRequest {
  RepositoryRef repository = 1; // REQUIRED
  bytes revision_hash = 2; // REQUIRED
  string path = 3;      // REQUIRED
}

message BlameResponse {
  repeated BlameLine lines = 1; // OPTIONAL
}

message TextQueryRequest {
  RepositoryRef repository = 1; // REQUIRED
  string query = 2;        // REQUIRED
  bytes at_revision_hash = 3; // OPTIONAL
  string path_prefix = 4;  // OPTIONAL
  string path_glob = 5;    // OPTIONAL
  bool regex = 6;          // OPTIONAL
  bool case_sensitive = 7; // OPTIONAL
  string language_hint = 8; // OPTIONAL
  uint32 limit = 9;       // REQUIRED for bounded response
  uint32 offset = 10;      // OPTIONAL
  bytes page_token = 11;   // OPTIONAL
}

message TextQueryMatch {
  string path = 1;
  uint32 line = 2;
  uint32 column = 3;
  string snippet = 4;
  string session_id = 5;
  IdentityRef attributed_to = 6;
  bytes revision_hash = 7;
  string revision_etag = 8;
}

message TextQueryResponse {
  uint64 total = 1;             // REQUIRED
  repeated TextQueryMatch matches = 2; // REQUIRED
  bytes next_page_token = 3;    // OPTIONAL
}
